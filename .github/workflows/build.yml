name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install openai-whisper torch customtkinter pillow pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --hidden-import=whisper transcritor_melhorado.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: dist/*.exe
