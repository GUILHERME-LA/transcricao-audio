name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 🔥 BAIXA O FFMPEG AUTOMATICAMENTE
      - name: Download FFmpeg
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive ffmpeg.zip -DestinationPath .
          $folder = Get-ChildItem -Directory | Where-Object { $_.Name -like "ffmpeg-*" } | Select-Object -First 1
          Copy-Item "$($folder.FullName)\bin\ffmpeg.exe" -Destination "ffmpeg.exe"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install openai-whisper torch customtkinter pillow pyinstaller

      # 🔥 BUILD COM FFMPEG EMBUTIDO
      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole ^
          --hidden-import=whisper ^
          --add-binary "ffmpeg.exe;." ^
          transcritor_melhorado.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: dist/*.exe